server:
  port: 8202

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

spring:

  devtools:
    restart:
      enabled: false  # 禁用自动重启
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shequ-sys?characterEncoding=utf-8&useSSL=false
    username: root
    password: ${DB_PASSWORD:your_password}
#  redis:
#    enabled: false
#    host: localhost   # 若Docker环境需用宿主机IP
#    port: 6379
#    password: "your_password"  # 若Redis有密码，必须匹配[3,6](@ref)
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 1800000
    password:
    lettuce:
      pool:
        max-active: 20 #最大连接数
        max-wait: -1    #最大阻塞等待时间(负数表示没限制)
        max-idle: 5    #最大空闲
        min-idle: 0     #最小空闲

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

management:
  health:
    redis:
      enabled: false  # 暂时禁用健康检查

